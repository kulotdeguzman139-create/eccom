<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="./vars.css">
  <link rel="stylesheet" href="./style.css">
  
  
  <style>
   a,
   button,
   input,
   select,
   h1,
   h2,
   h3,
   h4,
   h5,
   * {
       box-sizing: border-box;
       margin: 0;
       padding: 0;
       border: none;
       text-decoration: none;
       background: none;
   
       -webkit-font-smoothing: antialiased;
   }
   
   menu, ol, ul {
       list-style-type: none;
       margin: 0;
       padding: 0;
   }
   </style>
  <title>Document</title>
</head>
<body>
  <div class="market-stores-cart">
    <div class="main">
      <div class="title-base">
        <div class="wrapper">
          <div class="title">
            <div class="main-title">Shopping cart</div>
          </div>
        </div>
      </div>
    </div>
    <div class="cart">
      <div class="wrapper2">
        <div class="delete-icon">
          <div class="icon">
            <div class="medium-default">
              <img class="wrapper3" src="wrapper2.svg" />
            </div>
          </div>
        </div>
        <div class="elements">
          <div class="product-info">
            <div class="container">
              <div class="product">
                <div class="wrapper4">
                  <div class="elements-container">
                    <div class="container2">
                      <div class="wrapper5">
                        <img
                          class="icon-image-default"
                          src="icon-image-default0.svg"
                        />
                        <img class="placeholder" src="placeholder0.png" />
                      </div>
                    </div>
                  </div>
                  <div class="item">
                    <div class="item2">Bershka Mom Jeans</div>
                  </div>
                </div>
              </div>
              <div class="wrapper2">
                <div class="details">
                  <div class="xs-24-blue-x-1">S - 26 | Blue | x1</div>
                  <div class="_000">$34</div>
                </div>
              </div>
            </div>
          </div>
          <div class="buttons">
            <div class="wrapper6">
              <div class="label">
                <div class="container3">
                  <div class="label2">Edit</div>
                </div>
              </div>
              <div class="label">
                <div class="container3">
                  <div class="label2">Save</div>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
    <div class="one-line">
      <div class="status-only">
        <div class="system-status-bar">
          <div class="rectangle-2"></div>
        </div>
      </div>
      <div class="container4">
        <div class="wrapper7">
          <div class="icon2">
            <div class="medium-default2">
  <a href="http://127.0.0.1:5500/market_stores_product_cart/index.html">
    <img class="wrapper8" src="wrapper8.svg" alt="Home" />
  </a>
</div>
          </div>
          <div class="huge">
            <img class="wrapper9" src="wrapper9.svg" />
          </div>
          <div class="icon3">
            <div class="placeholder2">
              <div class="wrapper10">
                <div class="icon4"></div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
    <div class="checkout-bar">

      <div class="checkout-bar-base">
        <div class="wrapper11">
          <div class="label3">
            <div class="subtotal-vat-included">Subtotal (VAT included)</div>
          </div>
          <div class="total">
            <div class="_000">$34</div>
          </div>
        </div>
      </div>
      <div class="tool-bar">
        <div class="elements-button-row">
          <div class="container5">
            <div class="label4">
              <div class="container3">
  <a href="http://127.0.0.1:5500/market_stores_checkout_address-top/index.html" class="label5">Continue to checkout</a>
</div>
            </div>
          </div>
        </div>
        <div class="system-light-home-indicator"></div>
      </div>
    </div>
  </div>
  
</body>
</html>
